[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/shop"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/herbal-wisdom"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/herbal-library"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/custom-formula"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/herb-index"
  to = "/index.html"
  status = 200

# Legacy library URLs — all old paths now redirect to the merged Herb & Ingredient Library.
[[redirects]]
  from = "/herb-encyclopedia"
  to = "/herb-ingredient-library"
  status = 301
  force = true

[[redirects]]
  from = "/ingredient-library"
  to = "/herb-ingredient-library"
  status = 301
  force = true

[[redirects]]
  from = "/herbs"
  to = "/herb-ingredient-library"
  status = 301
  force = true

[[redirects]]
  from = "/ingredients"
  to = "/herb-ingredient-library"
  status = 301
  force = true

# Canonical Herb & Ingredient Library — internally rewrites to the merged section anchor.
[[redirects]]
  from = "/herb-ingredient-library"
  to = "/index.html#herbal-library"
  status = 200

# Legacy custom-soap order URLs — redirect to the Soap Builder.
[[redirects]]
  from = "/custom-soap-order"
  to = "/soap-builder"
  status = 301
  force = true

[[redirects]]
  from = "/order-soap"
  to = "/soap-builder"
  status = 301
  force = true

[[redirects]]
  from = "/order-a-custom-soap"
  to = "/soap-builder"
  status = 301
  force = true

# Direct deep-link to the Custom Soap Builder.
[[redirects]]
  from = "/soap-builder"
  to = "/index.html#soaps"
  status = 200

[[redirects]]
  from = "/custom-soap-builder"
  to = "/index.html#soaps"
  status = 200

[[redirects]]
  from = "/journal"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/soaps"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/soap-menu"
  to = "/soap-menu.html"
  status = 200

[[redirects]]
  from = "/soap-flyer"
  to = "/soap-menu.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/faqs"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/start-here"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/images/social-preview.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    X-Robots-Tag = "all"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
