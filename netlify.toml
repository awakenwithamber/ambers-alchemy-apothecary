[build]
  publish = "."
  functions = "netlify/functions"

# ── Security headers ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://awakenagain.com"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# ── Page redirects ──────────────────────────────────────────
[[redirects]]
  from = "/grimior"
  to = "/grimior.html"
  status = 200

[[redirects]]
  from = "/ingredient-library"
  to = "/herbal-index.html"
  status = 301

[[redirects]]
  from = "/ingredient-library.html"
  to = "/herbal-index.html"
  status = 301

[[redirects]]
  from = "/herb-encyclopedia"
  to = "/herbal-index.html"
  status = 301

[[redirects]]
  from = "/herbal-encyclopedia"
  to = "/herbal-index.html"
  status = 301

[[redirects]]
  from = "/create-remedy"
  to = "/create-remedy.html"
  status = 200

[[redirects]]
  from = "/articles"
  to = "/articles.html"
  status = 200

[[redirects]]
  from = "/herbal-index"
  to = "/herbal-index.html"
  status = 200

# ── Old anchor → new page redirects ─────────────────────────
[[redirects]]
  from = "/#herb-encyclopedia"
  to = "/herbal-index.html"
  status = 301

[[redirects]]
  from = "/#ingredient-library"
  to = "/herbal-index.html"
  status = 301
